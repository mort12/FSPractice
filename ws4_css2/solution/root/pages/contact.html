<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Kapcsolat</title>
    <meta name="description" content="Kapcsolat">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" type="text/css" href="../styles/main.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <h1>Lépjen velünk kapcsolatba</h1>

    <form class="w-50">
        <div class="input-group mb-3">
            <span class="input-group-text" id="basic-addon1">Name</span>
            <input type="text" class="form-control" placeholder="your name" aria-label="Username"
                aria-describedby="basic-addon1">
        </div>

        <div class="input-group mb-3">
            <span class="input-group-text" id="basic-addon1">E-mail</span>
            <input type="text" class="form-control" placeholder="valaki@example.com" aria-label="Username"
                aria-describedby="basic-addon1">
        </div>

        <div class="input-group mb-3">
            <span class="input-group-text" id="basic-addon1">Státusz</span>
            <div class="input-group-text">
                <input class="form-check-input mt-0" type="radio" name="status" value="student"
                    aria-label="Radio button for following text input">&nbsp;Hallgató&nbsp;
                <input class="form-check-input mt-0" type="radio" name="status" value="teacher"
                    aria-label="Radio button for following text input">&nbsp;Oktató&nbsp;
                <input class="form-check-input mt-0" type="radio" name="status" value="external"
                    aria-label="Radio button for following text input">&nbsp;Külsős személy
            </div>
        </div>

        <div class="input-group mb-3">
            <span class="input-group-text" id="basic-addon1">Tárgy</span>
            <input type="text" class="form-control" placeholder="tárgy" aria-label="Username"
                aria-describedby="basic-addon1">
        </div>

        <div class="input-group mb-3">
            <span class="input-group-text">Üzenet</span>
            <textarea class="form-control" placeholder="írja ide az üzenetét" aria-label="With textarea"></textarea>
        </div>

        <div class="input-group mb-3 col-12">
            <button type="submit" class="btn btn-primary">Küldés</button>
        </div>
    </form>

    <iframe
        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2693.737425251329!2d19.034628700000003!3d47.533974799999996!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x4741d95af5205aed%3A0x53008033a7aa5533!2s%C3%93budai%20Egyetem%20BA%20Building%2C%20Neumann%20J%C3%A1nos%20Informatikai%20Kar!5e0!3m2!1shu!2sat!4v1771879747544!5m2!1shu!2sat"
        width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy"
        referrerpolicy="no-referrer-when-downgrade"></iframe>

</html>
