<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Probléma bejelentés</title>
    <meta name="description" content="Probléma bejelentés">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" type="text/css" href="../styles/main.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <h1>Probléma bejelentés</h1>
    <form class="w-50">
        <div class="input-group mb-3">
            <span class="input-group-text" id="basic-addon1">E-mail</span>
            <input type="email" class="form-control" placeholder="valaki@example.com" aria-label="Username"
                aria-describedby="basic-addon1">
        </div>

        <div class="input-group mb-3">
            <label class="input-group-text" for="inputGroupSelect01">Bejelentés típusa</label>
            <select class="form-select" id="inputGroupSelect01">
                <option selected>Choose...</option>
                <option value="general">általános bejelentés</option>
                <option value="positive">pozitív véleményt kívánok tenni</option>
                <option value="complaint">panaszt kívánok tenni</option>
            </select>
        </div>

        <div class="input-group mb-3">
            <span class="input-group-text" id="basic-addon1">Értesítést kérek</span>
            <div class="input-group-text">
                <input class="form-check-input mt-0" type="radio" name="notification" value="yes"
                    aria-label="Radio button for following text input">&nbsp;Igen&nbsp;
                <input class="form-check-input mt-0" type="radio" name="notification" value="no"
                    aria-label="Radio button for following text input">&nbsp;Nem
            </div>
        </div>

        <div class="input-group mb-3">
            <span class="input-group-text" id="basic-addon1">Tárgy</span>
            <input type="text" class="form-control" placeholder="tárgy" aria-label="Username"
                aria-describedby="basic-addon1">
        </div>

        <div class="input-group mb-3">
            <span class="input-group-text">Üzenet</span>
            <textarea class="form-control" placeholder="írja ide az üzenetét" aria-label="With textarea"></textarea>
        </div>

        <div class="input-group mb-3 col-12">
            <button type="submit" class="btn btn-primary">Küldés</button>
        </div>
    </form>
</body>

</html>
