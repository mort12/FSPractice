<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Kapcsolat</title>
    <meta name="description" content="Kapcsolat">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" type="text/css" href="../styles/main.css">
</head>

<body>
    <form>
        <b>Lépjen velünk kapcsolatba</b><br><br>
        <label>Név: </label><input type="text" name="name" placeholder="név"><br>
        <label>E-mail: </label><input type="email" name="email" placeholder="valaki@example.com"><br>
        <label>Státusz: </label>
        <input type="radio" name="status" value="hallgató"> Hallagtó
        <input type="radio" name="status" value="oktató"> Oktató
        <input type="radio" name="status" value="külsős személy"> Külsős személy<br>
        <label>Tárgy: </label><input type="text" name="subject" placeholder="tárgy"><br>
        <label>Üzenet: </label><textarea name="message" placeholder="írja ide az üzenetét" rows="5" cols="40"></textarea><br><br>        
        <input type="submit" value="Küldés">
    </form>
